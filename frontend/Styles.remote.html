<style>
:root{--bg:#120911;--card:#21121f;--text:#fff7fb;--muted:#d8b9cd;--gold:#f6c76b;--pink:#ff6fb1;--line:rgba(255,255,255,.13)}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top,#3b1230,#120911 48%,#080508);color:var(--text)}a{color:inherit;text-decoration:none}.top{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;gap:16px;align-items:center;padding:14px 6vw;background:rgba(18,9,17,.78);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}.brand{display:flex;gap:12px;align-items:center}.brand span{display:block;color:var(--muted);font-size:13px}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,var(--gold),var(--pink));display:grid;place-items:center;color:#190611;font-weight:900}nav{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:14px}main{padding:0 6vw}.hero{min-height:72vh;display:grid;grid-template-columns:1.2fr .8fr;gap:26px;align-items:center}.hero h1{font-size:clamp(38px,7vw,82px);line-height:.95;margin:8px 0}.hero p{color:var(--muted);font-size:18px;max-width:720px}.eyebrow{color:var(--gold)!important;text-transform:uppercase;letter-spacing:.14em;font-size:12px!important;font-weight:800}.btn{border:0;border-radius:999px;padding:13px 19px;background:linear-gradient(135deg,var(--gold),var(--pink));font-weight:800;color:#160411;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}.btn.small{padding:10px 14px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.card{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.25)}.heroCard{min-height:360px;display:flex;flex-direction:column;justify-content:flex-end;background:linear-gradient(145deg,rgba(255,111,177,.22),rgba(246,199,107,.16));overflow:hidden;position:relative}.heroCard:before{content:'';position:absolute;inset:20px;border-radius:28px;border:1px solid rgba(255,255,255,.16)}.section{padding:58px 0}.sectionHead{display:flex;justify-content:space-between;align-items:end;gap:20px;flex-wrap:wrap}.section h2{font-size:34px;margin:4px 0 18px}.filters{display:flex;gap:10px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}.product{overflow:hidden}.product .img{height:180px;border-radius:20px;background:linear-gradient(135deg,rgba(246,199,107,.18),rgba(255,111,177,.22));display:grid;place-items:center;color:var(--muted);margin-bottom:14px}.product h3{margin:0 0 6px}.price{font-size:22px;color:var(--gold);font-weight:900}.two{display:grid;grid-template-columns:1fr 1fr;gap:18px}input,select,textarea{width:100%;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(0,0,0,.22);color:var(--text);margin:6px 0}textarea{min-height:92px;resize:vertical}pre{white-space:pre-wrap;color:var(--muted)}table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px}td,th{border-bottom:1px solid var(--line);padding:8px;text-align:left}footer{padding:34px 6vw;color:var(--muted);border-top:1px solid var(--line)}.ok{color:#9cffc3}.err{color:#ff9bb1}@media(max-width:800px){.hero,.two{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.hero{padding-top:40px}}
</style>
