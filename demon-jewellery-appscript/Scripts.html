<script>
const state={products:[],cart:JSON.parse(localStorage.getItem('dj-cart')||'{}')};
const $=s=>document.querySelector(s);
const money=n=>new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'}).format(n);
document.addEventListener('DOMContentLoaded',()=>{$('#year').textContent=new Date().getFullYear();bind();loadCatalog();const wa=(APP_CONFIG.whatsapp||'').replace(/\D/g,'');$('#whatsappLink').href=wa?`https://wa.me/${wa}?text=${encodeURIComponent('Hola, me interesa una pieza de Demon Jewellery.')}`:`${APP_CONFIG.webAppUrl}#contacto`;renderCart();});
function bind(){$('#cartButton').onclick=openCart;$('#closeCart').onclick=closeCart;$('#overlay').onclick=closeCart;$('#checkoutButton').onclick=()=>{if(!cartItems().length)return alert('Agrega al menos un producto.');$('#checkoutDialog').showModal();};$('#closeCheckout').onclick=()=>$('#checkoutDialog').close();$('#search').oninput=e=>renderCatalog(e.target.value);$('#checkoutForm').addEventListener('submit',submitOrder);}
function loadCatalog(){google.script.run.withSuccessHandler(data=>{state.products=data||[];renderCatalog('');}).withFailureHandler(showError).obtenerCatalogo();}
function renderCatalog(q){q=(q||'').toLowerCase();const items=state.products.filter(p=>`${p.nombre} ${p.descripcion} ${p.categoria}`.toLowerCase().includes(q));$('#catalogGrid').innerHTML=items.length?items.map(p=>`<article class="card">${p.imagenUrl?`<img src="${esc(p.imagenUrl)}" alt="${esc(p.nombre)}" loading="lazy">`:`<div class="placeholder">◇</div>`}<div class="card-body"><h3>${esc(p.nombre)}</h3><p>${esc(p.descripcion)}</p><div class="price-row"><span class="price">${money(p.precio)}</span><button class="small-btn" onclick="addToCart('${esc(p.id)}')" ${p.existencia<1?'disabled':''}>${p.existencia<1?'Agotado':'Agregar'}</button></div></div></article>`).join(''):'<p class="loading">No se encontraron productos.</p>';}
function addToCart(id){state.cart[id]=(state.cart[id]||0)+1;saveCart();renderCart();openCart();}
function changeQty(id,delta){state.cart[id]=(state.cart[id]||0)+delta;if(state.cart[id]<=0)delete state.cart[id];saveCart();renderCart();}
function cartItems(){return Object.entries(state.cart).map(([id,cantidad])=>{const p=state.products.find(x=>x.id===id);return p?{...p,cantidad}:null;}).filter(Boolean);}
function renderCart(){const items=cartItems();$('#cartCount').textContent=items.reduce((s,i)=>s+i.cantidad,0);$('#cartItems').innerHTML=items.length?items.map(i=>`<div class="cart-item"><div><strong>${esc(i.nombre)}</strong><br><small>${money(i.precio)} c/u</small></div><div class="qty"><button onclick="changeQty('${esc(i.id)}',-1)">−</button><span>${i.cantidad}</span><button onclick="changeQty('${esc(i.id)}',1)">+</button></div></div>`).join(''):'<p class="loading">Tu carrito está vacío.</p>';$('#cartTotal').textContent=money(items.reduce((s,i)=>s+i.precio*i.cantidad,0));}
function saveCart(){localStorage.setItem('dj-cart',JSON.stringify(state.cart));}
function openCart(){$('#cartDrawer').classList.add('open');$('#overlay').classList.add('show');$('#cartDrawer').setAttribute('aria-hidden','false');}
function closeCart(){$('#cartDrawer').classList.remove('open');$('#overlay').classList.remove('show');$('#cartDrawer').setAttribute('aria-hidden','true');}
function submitOrder(e){e.preventDefault();const f=new FormData(e.currentTarget);const payload=Object.fromEntries(f.entries());payload.items=cartItems().map(i=>({id:i.id,cantidad:i.cantidad}));$('#formStatus').textContent='Registrando pedido…';google.script.run.withSuccessHandler(r=>{state.cart={};saveCart();renderCart();e.currentTarget.reset();$('#formStatus').textContent=`Pedido ${r.pedidoId} registrado. Total: ${money(r.total)}`;setTimeout(()=>$('#checkoutDialog').close(),3000);}).withFailureHandler(err=>{$('#formStatus').textContent=err.message||String(err);}).crearPedido(payload);}
function showError(err){$('#catalogGrid').innerHTML=`<p class="loading">Error: ${esc(err.message||String(err))}</p>`;}
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
</script>
