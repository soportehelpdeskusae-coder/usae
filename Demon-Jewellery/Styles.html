<style>
:root{--bg:#050505;--panel:#101010;--gold:#c9a44e;--gold2:#f0d68a;--text:#f7f3e8;--muted:#aaa18e;--line:#29251d}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 system-ui,-apple-system,Segoe UI,sans-serif}.topbar{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:14px clamp(18px,5vw,72px);background:rgba(5,5,5,.92);border-bottom:1px solid var(--line)}a{color:inherit;text-decoration:none}.brand{display:flex;gap:10px;align-items:center}.brand-mark{color:var(--gold);font-size:28px}.brand strong{display:block;letter-spacing:.08em}.brand small{display:block;color:var(--gold);font-family:cursive}nav{display:flex;align-items:center;gap:20px}nav a{color:var(--muted)}button,input,textarea,select{font:inherit}.cart-btn,.primary{border:1px solid var(--gold);background:var(--gold);color:#080808;border-radius:999px;padding:11px 18px;font-weight:750;cursor:pointer}.hero{min-height:78vh;display:grid;grid-template-columns:1.3fr .7fr;align-items:center;gap:40px;padding:clamp(50px,8vw,110px) clamp(18px,8vw,120px);background:radial-gradient(circle at 70% 45%,#2b2210 0,transparent 28%),linear-gradient(135deg,#050505,#0d0b07)}.hero h1{font-family:Georgia,serif;font-size:clamp(42px,7vw,88px);line-height:1.02;margin:.2em 0}.hero-copy>p:not(.eyebrow){color:var(--muted);max-width:600px;font-size:1.15rem}.eyebrow{color:var(--gold);letter-spacing:.2em;font-weight:800;font-size:.78rem}.hero-card{aspect-ratio:1;max-width:420px;border:1px solid var(--gold);display:grid;place-content:center;text-align:center;background:#050505;box-shadow:0 30px 90px #000}.hero-card .diamond{font-size:76px;color:var(--gold)}.hero-card p{font-family:Georgia,serif;font-size:34px;letter-spacing:.08em;margin:0}.hero-card small{font-family:cursive;color:var(--gold);font-size:24px}.section{padding:80px clamp(18px,8vw,120px)}.section-head,.split{display:flex;justify-content:space-between;align-items:end;gap:30px}.section h2{font:clamp(30px,4vw,52px)/1.1 Georgia,serif;margin:.2em 0}.section-head input{width:min(320px,100%);background:#0e0e0e;border:1px solid var(--line);color:#fff;padding:12px 16px;border-radius:999px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px;margin-top:36px}.card{background:var(--panel);border:1px solid var(--line);overflow:hidden;border-radius:18px}.card img,.placeholder{width:100%;aspect-ratio:4/5;object-fit:cover;background:linear-gradient(145deg,#201b10,#080808);display:grid;place-items:center;color:var(--gold);font-size:54px}.card-body{padding:18px}.card p{color:var(--muted);min-height:48px}.price-row{display:flex;justify-content:space-between;align-items:center;gap:12px}.price{font-size:1.25rem;font-weight:800;color:var(--gold2)}.small-btn{border:1px solid var(--gold);background:transparent;color:var(--gold2);padding:8px 12px;border-radius:999px}.contact{text-align:center;background:#0b0905}.split>p{max-width:640px;color:var(--muted)}footer{text-align:center;padding:28px;color:var(--muted);border-top:1px solid var(--line)}.drawer{position:fixed;z-index:40;right:0;top:0;height:100%;width:min(430px,100%);background:#0b0b0b;border-left:1px solid var(--line);padding:22px;transform:translateX(100%);transition:.25s;overflow:auto}.drawer.open{transform:none}.drawer-head{display:flex;justify-content:space-between;align-items:center}.drawer-head button{background:none;border:0;color:#fff;font-size:32px}.overlay{position:fixed;inset:0;background:#000a;z-index:30;display:none}.overlay.show{display:block}.cart-item{display:grid;grid-template-columns:1fr auto;gap:10px;padding:14px 0;border-bottom:1px solid var(--line)}.qty{display:flex;align-items:center;gap:8px}.totals{display:flex;justify-content:space-between;padding:20px 0;font-size:1.2rem}.full{width:100%}dialog{width:min(560px,calc(100% - 24px));background:#0d0d0d;color:#fff;border:1px solid var(--gold);border-radius:20px;padding:0}dialog::backdrop{background:#000b}dialog form{padding:22px}label{display:grid;gap:6px;margin:14px 0;color:var(--muted)}label input,label textarea,label select{background:#151515;color:#fff;border:1px solid var(--line);border-radius:10px;padding:12px}textarea{min-height:90px}.status{min-height:24px;color:var(--gold2)}.loading{color:var(--muted)}@media(max-width:900px){nav a{display:none}.hero{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.section-head,.split{align-items:stretch;flex-direction:column}}@media(max-width:560px){.grid{grid-template-columns:1fr}.topbar{padding:12px 16px}.brand small{display:none}}
</style>
