name: Deploy Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apps-script-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar secretos
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::Falta el secreto CLASPRC_JSON"
            exit 1
          fi

          if [ -z "$SCRIPT_ID" ]; then
            echo "::error::Falta el secreto SCRIPT_ID"
            exit 1
          fi

      - name: Configurar clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          printf '{"scriptId":"%s","rootDir":"src"}\n' "$SCRIPT_ID" > .clasp.json

      - name: Validar configuración JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME + '/.clasprc.json', 'utf8')); console.log('CLASPRC_JSON válido')"
          node -e "JSON.parse(require('fs').readFileSync('.clasp.json', 'utf8')); console.log('.clasp.json válido')"
          node -e "JSON.parse(require('fs').readFileSync('src/appsscript.json', 'utf8')); console.log('appsscript.json válido')"

      - name: Revisar archivos de Apps Script
        run: npx clasp status

      - name: Subir código a Apps Script
        run: npx clasp push --force
