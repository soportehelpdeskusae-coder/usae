<style>
:root{
  --black:#050505;
  --black-soft:#0b0b0c;
  --panel:#111113;
  --panel-2:#171719;
  --white:#f7f5ef;
  --silver:#c9c9cb;
  --muted:#9c9ca1;
  --gold:#c9a548;
  --gold-light:#ebd48b;
  --gold-dark:#6f551a;
  --red:#b6212b;
  --green:#58c985;
  --danger:#ff7b86;
  --line:rgba(235,212,139,.18);
  --line-soft:rgba(255,255,255,.09);
  --shadow:0 30px 90px rgba(0,0,0,.48);
  --radius:28px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Montserrat',Arial,sans-serif;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:110px}
body{
  margin:0;
  min-width:320px;
  color:var(--white);
  background:
    radial-gradient(circle at 82% 5%,rgba(201,165,72,.11),transparent 23rem),
    radial-gradient(circle at 8% 32%,rgba(182,33,43,.055),transparent 26rem),
    linear-gradient(180deg,#030303 0%,#080809 48%,#040404 100%);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.65;
  overflow-x:hidden;
}
body:before{
  content:'';
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  opacity:.22;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.13'/%3E%3C/svg%3E");
}
::selection{background:var(--gold);color:#050505}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font:inherit}
button{color:inherit}
img{display:block;max-width:100%}
svg{display:block}

.skip-link{
  position:fixed;
  left:16px;
  top:-80px;
  z-index:200;
  padding:10px 14px;
  color:#050505;
  background:var(--gold-light);
  border-radius:10px;
  transition:.2s ease;
}
.skip-link:focus{top:16px}
.sr-only{
  position:absolute!important;
  width:1px!important;
  height:1px!important;
  padding:0!important;
  margin:-1px!important;
  overflow:hidden!important;
  clip:rect(0,0,0,0)!important;
  white-space:nowrap!important;
  border:0!important;
}

.announcement{
  min-height:33px;
  padding:6px 5vw;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  color:#181203;
  background:linear-gradient(90deg,#927122,#e5cf82 48%,#927122);
  font-size:10px;
  font-weight:700;
  letter-spacing:.17em;
  text-align:center;
  text-transform:uppercase;
}
.announcement p{margin:0}
.announcement .spark{font-size:12px}

.top{
  position:sticky;
  top:0;
  z-index:100;
  min-height:78px;
  padding:13px clamp(20px,5vw,80px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
  background:rgba(5,5,5,.86);
  border-bottom:1px solid var(--line-soft);
  box-shadow:0 10px 40px rgba(0,0,0,.25);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.brand{display:flex;align-items:center;gap:13px;min-width:max-content}
.brand-mark{
  width:45px;
  height:45px;
  display:grid;
  place-items:center;
  border:1px solid rgba(235,212,139,.55);
  border-radius:50%;
  background:radial-gradient(circle at 35% 25%,rgba(235,212,139,.2),rgba(201,165,72,.03) 58%);
  box-shadow:inset 0 0 0 4px rgba(0,0,0,.38),0 0 30px rgba(201,165,72,.08);
}
.brand-mark svg{width:25px;height:25px;fill:none;stroke:var(--gold-light);stroke-width:2.2;stroke-linejoin:round}
.brand-copy{display:flex;flex-direction:column;line-height:1.05}
.brand-copy strong{
  font-family:var(--serif);
  font-size:21px;
  letter-spacing:.1em;
  font-weight:700;
}
.brand-copy small{
  margin-top:5px;
  color:var(--gold-light);
  font-family:var(--serif);
  font-size:12px;
  font-style:italic;
  letter-spacing:.16em;
}
.top nav{display:flex;align-items:center;gap:30px}
.top nav a{
  position:relative;
  color:#d5d3ce;
  font-size:11px;
  font-weight:600;
  letter-spacing:.1em;
  text-transform:uppercase;
  transition:.25s ease;
}
.top nav a:not(.nav-cta):after{
  content:'';
  position:absolute;
  left:0;
  right:100%;
  bottom:-8px;
  height:1px;
  background:var(--gold-light);
  transition:.25s ease;
}
.top nav a:hover{color:var(--gold-light)}
.top nav a:hover:after{right:0}
.top nav .nav-cta{
  padding:10px 16px;
  color:#090806;
  border-radius:999px;
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  box-shadow:0 8px 28px rgba(201,165,72,.16);
}
.menu-toggle{
  display:none;
  width:44px;
  height:44px;
  padding:11px;
  border:1px solid var(--line-soft);
  border-radius:50%;
  background:rgba(255,255,255,.025);
}
.menu-toggle span{display:block;height:1px;margin:5px 0;background:var(--gold-light)}

main{width:min(1460px,100%);margin:0 auto;padding:0 clamp(20px,5vw,80px)}
.hero{
  min-height:calc(100vh - 111px);
  padding:clamp(60px,8vw,120px) 0;
  display:grid;
  grid-template-columns:minmax(0,1.02fr) minmax(340px,.98fr);
  align-items:center;
  gap:clamp(42px,7vw,110px);
}
.hero-copy{position:relative;z-index:2}
.eyebrow{
  margin:0 0 18px;
  display:flex;
  align-items:center;
  gap:11px;
  color:var(--gold-light)!important;
  font-size:10px!important;
  font-weight:700;
  letter-spacing:.23em;
  text-transform:uppercase;
}
.eyebrow span{width:34px;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
.hero h1,.section h2,.panel h2,.tracking-section h2,.admin-content h2{
  margin:0;
  font-family:var(--serif);
  font-weight:600;
  letter-spacing:-.02em;
}
.hero h1{
  max-width:720px;
  font-size:clamp(56px,7.1vw,112px);
  line-height:.84;
}
.hero h1 em{
  display:block;
  margin-top:12px;
  color:var(--gold-light);
  font-weight:500;
}
.hero-lead{
  max-width:600px;
  margin:30px 0 0;
  color:#b7b6b4;
  font-size:clamp(15px,1.3vw,18px);
}
.actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hero-actions{margin-top:34px}
.btn{
  position:relative;
  min-height:49px;
  padding:13px 22px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:13px;
  overflow:hidden;
  border:1px solid var(--gold);
  border-radius:999px;
  color:#0b0904;
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  box-shadow:0 15px 38px rgba(201,165,72,.13);
  cursor:pointer;
  font-size:11px;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  transition:transform .22s ease,box-shadow .22s ease,filter .22s ease;
}
.btn:before{
  content:'';
  position:absolute;
  inset:-70% auto -70% -45%;
  width:34%;
  transform:rotate(18deg);
  background:rgba(255,255,255,.36);
  transition:left .45s ease;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 20px 45px rgba(201,165,72,.21);filter:saturate(1.08)}
.btn:hover:before{left:120%}
.btn:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,summary:focus-visible{outline:2px solid var(--gold-light);outline-offset:3px}
.btn.ghost{
  color:var(--white);
  border-color:rgba(235,212,139,.32);
  background:transparent;
  box-shadow:none;
}
.btn.ghost:hover{color:var(--gold-light);border-color:var(--gold)}
.btn.compact{min-height:44px;padding:10px 17px}
.btn.full{width:100%;margin-top:8px}
.btn[disabled]{opacity:.55;cursor:not-allowed;transform:none}
.hero-notes{
  margin-top:48px;
  padding-top:22px;
  display:flex;
  gap:24px;
  flex-wrap:wrap;
  border-top:1px solid var(--line-soft);
}
.hero-notes span{display:flex;align-items:center;gap:8px;color:#9d9c99;font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.hero-notes b{color:var(--gold-light);font-family:var(--serif);font-size:17px;font-weight:600}

.hero-visual{position:relative;min-height:600px;display:grid;place-items:center}
.hero-frame{
  position:relative;
  z-index:3;
  width:min(100%,510px);
  aspect-ratio:4/5;
  padding:13px;
  border:1px solid rgba(235,212,139,.32);
  background:#080808;
  box-shadow:var(--shadow);
  transform:rotate(1.2deg);
}
.hero-frame:before,.hero-frame:after{
  content:'';
  position:absolute;
  pointer-events:none;
}
.hero-frame:before{inset:26px;border:1px solid rgba(255,255,255,.08);z-index:2}
.hero-frame:after{width:88px;height:1px;right:-54px;top:60px;background:linear-gradient(90deg,var(--gold),transparent)}
.hero-media{
  position:relative;
  height:100%;
  overflow:hidden;
  display:grid;
  place-items:center;
  background:
    radial-gradient(circle at 50% 42%,rgba(255,255,255,.08),transparent 33%),
    linear-gradient(145deg,#141414,#030303 65%);
}
.hero-media:after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent 56%,rgba(0,0,0,.82) 96%);
  pointer-events:none;
}
.hero-media img{width:100%;height:100%;object-fit:cover;filter:contrast(1.05) saturate(.92)}
.jewel-placeholder svg{width:190px;max-width:48%;fill:none;stroke:rgba(235,212,139,.72);stroke-width:2;filter:drop-shadow(0 0 24px rgba(201,165,72,.2))}
.hero-caption{
  position:absolute;
  z-index:5;
  left:36px;
  right:36px;
  bottom:34px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:18px;
}
.hero-caption span{color:#c2c1bd;font-size:9px;letter-spacing:.19em;text-transform:uppercase}
.hero-caption strong{font-family:var(--serif);font-size:20px;letter-spacing:.08em;text-align:right}
.hero-monogram{
  position:absolute;
  z-index:1;
  right:-10px;
  bottom:48px;
  color:rgba(235,212,139,.085);
  font-family:var(--serif);
  font-size:180px;
  line-height:1;
}
.gold-orbit{position:absolute;border:1px solid rgba(201,165,72,.19);border-radius:50%}
.orbit-one{width:550px;height:550px;right:-70px;top:12px}
.orbit-two{width:410px;height:410px;right:20px;top:88px;border-style:dashed;animation:spin 42s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.trust-strip{
  padding:22px 0;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  border-top:1px solid var(--line-soft);
  border-bottom:1px solid var(--line-soft);
}
.trust-strip article{padding:10px clamp(12px,3vw,40px);display:flex;align-items:center;gap:16px;border-right:1px solid var(--line-soft)}
.trust-strip article:first-child{padding-left:0}
.trust-strip article:last-child{padding-right:0;border-right:0}
.trust-strip article>span{color:var(--gold-light);font-family:var(--serif);font-size:30px}
.trust-strip div{display:flex;flex-direction:column}
.trust-strip strong{font-family:var(--serif);font-size:18px;font-weight:600}
.trust-strip small{color:var(--muted);font-size:10px;letter-spacing:.04em}

.section{padding:clamp(78px,9vw,132px) 0}
.sectionHead{display:flex;align-items:flex-end;justify-content:space-between;gap:34px;margin-bottom:42px}
.section h2,.panel h2,.tracking-section h2,.admin-content h2{font-size:clamp(38px,4.4vw,68px);line-height:.98}
.section-copy{max-width:620px;margin:16px 0 0;color:var(--muted)}
.filters{display:grid;grid-template-columns:minmax(230px,1fr) minmax(190px,.7fr) auto;gap:10px;width:min(100%,650px)}
.field{position:relative;display:flex;align-items:center}
.field svg{position:absolute;left:15px;width:18px;height:18px;fill:none;stroke:#77777b;stroke-width:1.8;pointer-events:none}
.search-field input{padding-left:43px}
input,select,textarea{
  width:100%;
  margin:0;
  padding:13px 15px;
  color:var(--white);
  border:1px solid var(--line-soft);
  border-radius:13px;
  background:#0b0b0c;
  caret-color:var(--gold-light);
  transition:border-color .2s ease,background .2s ease,box-shadow .2s ease;
}
input::placeholder,textarea::placeholder{color:#66666b}
input:hover,select:hover,textarea:hover{border-color:rgba(235,212,139,.25)}
input:focus,select:focus,textarea:focus{border-color:var(--gold);background:#0e0e0f;box-shadow:0 0 0 4px rgba(201,165,72,.08);outline:0}
select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--gold-light) 50%),linear-gradient(135deg,var(--gold-light) 50%,transparent 50%);background-position:calc(100% - 18px) 52%,calc(100% - 13px) 52%;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:38px}
select option{color:var(--white);background:#0b0b0c}
textarea{min-height:120px;resize:vertical}
label{display:block;color:#c7c6c2;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
label input,label select,label textarea{margin-top:7px;font-size:13px;letter-spacing:normal;text-transform:none}

.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:22px}
.product{
  position:relative;
  min-width:0;
  overflow:hidden;
  border:1px solid var(--line-soft);
  background:linear-gradient(180deg,#101011,#09090a);
  box-shadow:0 20px 60px rgba(0,0,0,.2);
  transition:transform .3s ease,border-color .3s ease,box-shadow .3s ease;
}
.product:hover{transform:translateY(-7px);border-color:rgba(235,212,139,.34);box-shadow:0 30px 75px rgba(0,0,0,.38)}
.product-media{
  position:relative;
  aspect-ratio:4/3.8;
  overflow:hidden;
  display:grid;
  place-items:center;
  background:
    radial-gradient(circle at 50% 45%,rgba(255,255,255,.1),transparent 31%),
    #030303;
}
.product-media:after{content:'';position:absolute;inset:0;border-bottom:1px solid rgba(255,255,255,.06);box-shadow:inset 0 -45px 70px rgba(0,0,0,.22);pointer-events:none}
.product-media img{width:100%;height:100%;object-fit:cover;transition:transform .55s ease,filter .4s ease}
.product:hover .product-media img{transform:scale(1.045);filter:contrast(1.06)}
.product-placeholder{display:grid;place-items:center;color:var(--gold-light)}
.product-placeholder svg{width:88px;height:88px;fill:none;stroke:currentColor;stroke-width:1.5;opacity:.65}
.product-badge{
  position:absolute;
  z-index:2;
  top:14px;
  left:14px;
  padding:7px 10px;
  color:#0a0905;
  border-radius:999px;
  background:rgba(235,212,139,.9);
  font-size:8px;
  font-weight:700;
  letter-spacing:.11em;
  text-transform:uppercase;
  backdrop-filter:blur(8px);
}
.product-index{
  position:absolute;
  z-index:2;
  right:15px;
  bottom:10px;
  color:rgba(255,255,255,.48);
  font-family:var(--serif);
  font-size:22px;
}
.product-body{padding:22px}
.product-meta{min-height:17px;color:var(--gold-light);font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase}
.product h3{margin:5px 0 8px;font-family:var(--serif);font-size:28px;font-weight:600;line-height:1.05}
.product-description{min-height:49px;margin:0;color:#939397;font-size:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-bottom{margin-top:18px;padding-top:17px;display:flex;align-items:flex-end;justify-content:space-between;gap:14px;border-top:1px solid var(--line-soft)}
.price{display:flex;flex-direction:column;color:var(--gold-light);font-family:var(--serif);font-size:26px;font-weight:600;line-height:1}
.price small{margin-bottom:6px;color:#77777b;font-family:var(--sans);font-size:8px;font-weight:600;letter-spacing:.13em;text-transform:uppercase}
.product-actions{display:flex;gap:8px}
.icon-btn{
  width:43px;
  height:43px;
  padding:0;
  display:grid;
  place-items:center;
  border:1px solid var(--line-soft);
  border-radius:50%;
  color:var(--white);
  background:transparent;
  cursor:pointer;
  transition:.22s ease;
}
.icon-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8}
.icon-btn:hover{color:#080705;border-color:var(--gold);background:var(--gold-light);transform:translateY(-2px)}
.catalog-empty{grid-column:1/-1;padding:70px 24px;text-align:center;border:1px dashed var(--line);background:rgba(255,255,255,.015)}
.catalog-empty strong{display:block;font-family:var(--serif);font-size:32px}
.catalog-empty p{color:var(--muted)}
.skeleton{min-height:460px;overflow:hidden;border:1px solid var(--line-soft);background:#0c0c0d}
.skeleton:before{content:'';display:block;height:290px;background:linear-gradient(90deg,#111 25%,#191919 37%,#111 63%);background-size:400% 100%;animation:shine 1.4s ease infinite}
.skeleton:after{content:'';display:block;width:65%;height:18px;margin:28px 20px;border-radius:8px;background:linear-gradient(90deg,#111 25%,#191919 37%,#111 63%);background-size:400% 100%;animation:shine 1.4s ease infinite}
@keyframes shine{0%{background-position:100% 0}100%{background-position:0 0}}

.transaction-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px}
.panel{
  position:relative;
  padding:clamp(28px,4vw,56px);
  overflow:hidden;
  border:1px solid var(--line-soft);
  background:linear-gradient(145deg,#121213,#09090a);
  box-shadow:0 24px 80px rgba(0,0,0,.22);
}
.panel:after{content:'';position:absolute;width:310px;height:310px;right:-180px;top:-180px;border:1px solid rgba(201,165,72,.16);border-radius:50%}
.panel-number{position:absolute;right:28px;top:18px;color:rgba(235,212,139,.09);font-family:var(--serif);font-size:96px;line-height:1}
.panel .section-copy{min-height:52px;margin-bottom:28px}
.selected-product{
  margin:0 0 22px;
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:14px;
  border:1px solid var(--line);
  background:rgba(201,165,72,.045);
}
.selected-icon{width:38px;height:38px;display:grid;place-items:center;color:var(--gold-light);border:1px solid var(--line);border-radius:50%;font-family:var(--serif);font-size:23px}
.selected-product div{display:flex;flex-direction:column}
.selected-product small{color:#7f7f83;font-size:8px;font-weight:700;letter-spacing:.13em;text-transform:uppercase}
.selected-product strong{margin-top:3px;font-family:var(--serif);font-size:18px;font-weight:600}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:15px}
.panel form>label{margin-top:15px}
.form-message{margin-top:18px}
.result-card{padding:18px;border:1px solid var(--line);background:rgba(201,165,72,.04)}
.result-card p{margin:4px 0;color:#c9c8c3}
.result-card b{color:var(--gold-light)}
.ok{color:var(--green)!important}
.err{color:var(--danger)!important}
.loading-line{display:inline-flex;align-items:center;gap:8px;color:var(--muted)}
.loading-line:before{content:'';width:15px;height:15px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--gold-light);border-radius:50%;animation:spin .8s linear infinite}

.tracking-section{
  display:grid;
  grid-template-columns:.78fr 1.22fr;
  gap:clamp(38px,7vw,100px);
  align-items:center;
}
.tracking-copy p:last-child{color:var(--muted)}
.tracking-card{
  padding:clamp(24px,4vw,44px);
  border:1px solid var(--line);
  background:
    linear-gradient(135deg,rgba(201,165,72,.055),transparent 38%),
    #0d0d0e;
  box-shadow:var(--shadow);
}
.tracking-card form{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end}
.tracking-card pre{
  display:none;
  max-height:320px;
  margin:22px 0 0;
  padding:18px;
  overflow:auto;
  white-space:pre-wrap;
  color:#d2d1cc;
  border-left:2px solid var(--gold);
  background:#070707;
  font:12px/1.7 ui-monospace,SFMono-Regular,Menlo,monospace;
}
.tracking-card pre:not(:empty){display:block}

.admin-section{padding-top:20px}
.admin-details{border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft)}
.admin-details summary{
  padding:22px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  list-style:none;
}
.admin-details summary::-webkit-details-marker{display:none}
.admin-details summary span{font-family:var(--serif);font-size:22px}
.admin-details summary small{color:var(--muted);font-size:9px;letter-spacing:.15em;text-transform:uppercase}
