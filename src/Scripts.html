<script>
const $=s=>document.querySelector(s);function formObj(f){return Object.fromEntries(new FormData(f).entries())}function money(n){n=Number(n||0);return n?('$'+n.toLocaleString('es-MX')+' MXN'):'A cotizar'}function call(fn,...args){return new Promise((res,rej)=>google.script.run.withSuccessHandler(res).withFailureHandler(e=>rej(e))[fn](...args))}
async function cargarCatalogo(){const out=$('#catalogoGrid');out.innerHTML='<p>Cargando...</p>';try{const data=await call('obtenerCatalogo',{q:$('#q').value,categoria:$('#categoria').value});out.innerHTML=data.map(p=>`<article class="card product"><div class="img">${p.imageUrl?`<img src="${p.imageUrl}" style="max-width:100%;max-height:100%;border-radius:18px">`:'Demon Jewellery'}</div><h3>${p.nombre}</h3><p>${p.descripcion||''}</p><p><b>${p.material||''}</b></p><div class="price">${money(p.precioMXN)}</div><div class="actions"><button class="btn small" onclick="seleccionar('${p.productId}')">Comprar</button><a class="btn small ghost" target="_blank" href="${p.whatsappUrl}">WhatsApp</a></div></article>`).join('')||'<p>No hay productos.</p>';}catch(e){out.innerHTML='<p class="err">Error: '+e+'</p>'}}
function seleccionar(id){document.querySelector('[name=productId]').value=id;location.hash='pedido'}
async function cargarCategorias(){try{const cats=APP.categories||await call('obtenerCategorias');$('#categoria').innerHTML='<option value="">Todas</option>'+cats.map(c=>`<option>${c}</option>`).join('')}catch(e){}}
async function registrarPedido(ev){ev.preventDefault();const msg=$('#pedidoMsg');msg.textContent='Registrando...';try{const r=await call('registrarCompra',formObj(ev.target));if(!r.ok){msg.innerHTML='<p class="err">'+r.message+'</p>';return}msg.innerHTML=`<p class="ok">Pedido creado: <b>${r.data.orderId}</b></p><p>Referencia de pago: <b>${r.data.paymentReference}</b></p><p>Total: ${money(r.data.totalMXN)}</p><a class="btn small" target="_blank" href="${r.data.whatsappUrl}">Enviar por WhatsApp</a>`;ev.target.reset()}catch(e){msg.innerHTML='<p class="err">'+e+'</p>'}}
async function registrarDisenoWeb(ev){ev.preventDefault();const msg=$('#disenoMsg');msg.textContent='Enviando...';try{const r=await call('registrarDiseno',formObj(ev.target));if(!r.ok){msg.innerHTML='<p class="err">'+r.message+'</p>';return}msg.innerHTML=`<p class="ok">Solicitud creada: <b>${r.data.designId}</b></p><a class="btn small" target="_blank" href="${r.data.whatsappUrl}">Enviar por WhatsApp</a>`;ev.target.reset()}catch(e){msg.innerHTML='<p class="err">'+e+'</p>'}}
async function consultar(ev){ev.preventDefault();const o=$('#seguimientoMsg');o.textContent='Consultando...';try{const r=await call('consultarSeguimiento',$('#folio').value,$('#contacto').value);o.textContent=r.ok?JSON.stringify(r.data.item,null,2):r.message}catch(e){o.textContent=e}}
function table(rows){if(!rows||!rows.length)return'<p>Sin datos.</p>';const keys=Object.keys(rows[0]).slice(0,10);return'<table><thead><tr>'+keys.map(k=>'<th>'+k+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+keys.map(k=>'<td>'+String(r[k]||'')+'</td>').join('')+'</tr>').join('')+'</tbody></table>'}
async function adminPedidos(){const out=$('#adminOut');out.textContent='Cargando...';try{const r=await call('admin_listarPedidos',$('#pin').value);out.innerHTML=r.ok?table(r.data):'<p class="err">'+r.message+'</p>'}catch(e){out.innerHTML='<p class="err">'+e+'</p>'}}
async function adminDisenos(){const out=$('#adminOut');out.textContent='Cargando...';try{const r=await call('admin_listarDisenos',$('#pin').value);out.innerHTML=r.ok?table(r.data):'<p class="err">'+r.message+'</p>'}catch(e){out.innerHTML='<p class="err">'+e+'</p>'}}
document.addEventListener('DOMContentLoaded',()=>{cargarCategorias();cargarCatalogo();});
</script>
