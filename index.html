<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>USAE Joyería</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f5f7fb;color:#172033}
    main{max-width:1100px;margin:auto;padding:32px 20px}
    h1{margin-bottom:8px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-top:24px}
    .card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 10px 28px rgba(0,0,0,.08)}
    img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:12px;background:#e8edf5}
    .price{font-size:1.25rem;font-weight:700;color:#0f4ea6}.status{padding:14px;background:#eaf1ff;border-radius:10px}
  </style>
</head>
<body>
<main>
  <h1>USAE Joyería</h1>
  <p>Catálogo conectado con Google Sheets mediante Apps Script.</p>
  <div id="estado" class="status">Cargando catálogo...</div>
  <section id="catalogo" class="grid"></section>
</main>
<script>
  const estado=document.getElementById('estado');
  const catalogo=document.getElementById('catalogo');
  google.script.run.withSuccessHandler(productos=>{
    estado.textContent=productos.length?`${productos.length} productos disponibles`:'No hay productos activos';
    catalogo.innerHTML='';
    productos.forEach(p=>{
      const card=document.createElement('article');card.className='card';
      const img=document.createElement('img');img.src=p.ImagenURL||'';img.alt=p.Nombre||'Producto';
      const h2=document.createElement('h2');h2.textContent=p.Nombre||'';
      const desc=document.createElement('p');desc.textContent=p.Descripcion||'';
      const price=document.createElement('div');price.className='price';price.textContent=new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'}).format(Number(p.Precio||0));
      card.append(img,h2,desc,price);catalogo.appendChild(card);
    });
  }).withFailureHandler(err=>{estado.textContent='Error: '+(err.message||err);}).obtenerCatalogo();
</script>
</body>
</html>
